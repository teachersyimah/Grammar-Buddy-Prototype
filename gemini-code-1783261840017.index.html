<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grammar Buddy</title>
  <style>
    /* Reset & Global Styles */
    * {
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #dff6ff;
      color: #333;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* Container Box */
    .box {
      width: 100%;
      max-width: 500px;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      transition: all 0.3s ease;
    }

    h1 {
      margin-top: 0;
      color: #0077b6;
    }

    p {
      color: #666;
      font-size: 1.1rem;
    }

    /* Input Styling */
    textarea {
      width: 100%;
      height: 120px;
      padding: 12px;
      border: 2px solid #bde0fe;
      border-radius: 12px;
      font-size: 1rem;
      resize: none;
      transition: border-color 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: #0077b6;
    }

    /* Interactive Button */
    button {
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      background: #ffd166;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: bold;
      color: #333;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover:not(:disabled) {
      background: #ffc333;
      transform: translateY(-1px);
    }

    button:active:not(:disabled) {
      transform: translateY(1px);
    }

    button:disabled {
      background: #e0e0e0;
      cursor: not-allowed;
      color: #888;
    }

    /* Output Section */
    #response {
      margin-top: 25px;
      padding: 15px;
      border-radius: 12px;
      background: #f8f9fa;
      white-space: pre-wrap;
      text-align: left;
      line-height: 1.5;
      display: none; /* Hidden until triggered */
      border-left: 5px solid #0077b6;
    }

    /* Loading Pulse Animation */
    .loading {
      color: #666;
      font-style: italic;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }
  </style>
</head>
<body>

<div class="box">
  <h1>🐡 Grammar Buddy</h1>
  <p>Ask me grammar questions!</p>

  <textarea id="input" placeholder="Type your sentence here (e.g., 'I goes to school yesterday')"></textarea>
  
  <button id="submitBtn" onclick="ask()">Ask Buddy ✨</button>

  <div id="response"></div>
</div>

<script>
async function ask() {
  const inputEl = document.getElementById("input");
  const responseBox = document.getElementById("response");
  const button = document.getElementById("submitBtn");
  
  const text = inputEl.value.trim();

  // Don't trigger if input is empty
  if (!text) {
    alert("Please type something for Buddy to look at!");
    return;
  }

  // 1. UI updates for loading state
  button.disabled = true;
  responseBox.style.display = "block";
  responseBox.innerHTML = '<span class="loading">Thinking... 🤖</span>';

  const systemPrompt = `
You are Grammar Buddy for Year 5 students.

Only help with:
- Simple present tense
- Simple past tense
- Translation BM ↔ English
- Sentence correction

Be short, friendly, and use emojis. Keep language simple enough for a 11-year-old.
`;

  try {
    const res = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        // ⚠️ WARNING: Hardcoding keys on the frontend exposes them to the public. 
        // Use a backend proxy for production!
        "Authorization": "Bearer YOUR_API_KEY_HERE"
      },
      body: JSON.stringify({
        model: "gpt-4o-mini",
        messages: [
          { role: "system", content: systemPrompt },
          { role: "user", content: text }
        ],
        temperature: 0.7
      })
    });

    if (!res.ok) {
      throw new Error(`API Error: ${res.status}`);
    }

    const data = await res.json();
    
    // 2. Render response nicely
    responseBox.innerHTML = data.choices[0].message.content;

  } catch (error) {
    // 3. Graceful Error Catching
    console.error(error);
    responseBox.innerHTML = "❌ Oops! Buddy's brain stalled. Please check your API key setup or try again later.";
  } finally {
    // 4. Re-enable button
    button.disabled = false;
  }
}
</script>

</body>
</html>
